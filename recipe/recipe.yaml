context:
  name: apache-airflow-providers-common-sql
  version: "1.33.0"
  latest_airflow: 3.1.8

recipe:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/apache_airflow_providers_common_sql-${{ version }}.tar.gz
  sha256: ad53e3e84d05baa12f12ee5966b6a4d83ca74c74804b2b173884768561272928

build:
  noarch: python
  number: 0

outputs:
  - package:
      name: ${{ name }}
    build:
      noarch: python
      script: python -m pip install . -vv --no-deps --no-build-isolation
    requirements:
      host:
        - python ${{ python_min }}.*
        - pip
        - flit-core ==3.12.0
      run:
        - python >=${{ python_min }}
        - apache-airflow >=2.11.0
        - apache-airflow-providers-common-compat >=1.14.1
        - sqlparse >=0.5.1
        - more-itertools >=9.0.0
        - methodtools >=0.4.7
    tests:
      - requirements:
          run:
            - python ${{ python_min }}.*
            - pip
            - apache-airflow ${{ latest_airflow }}.*
        script:
          - python -c "import airflow.providers.common.sql"
          - pip check

  - package:
      name: ${{ name }}-with-openlineage
    build:
      noarch: python
    requirements:
      host:
        - python ${{ python_min }}.*
      run:
        - python >=${{ python_min }}
        - ${{ pin_subpackage(name, exact=True) }}
        - apache-airflow-providers-openlineage
    tests:
      - requirements:
          run:
            - python ${{ python_min }}.*
            - pip
            - apache-airflow ${{ latest_airflow }}.*
        script:
          - python -c "import airflow.providers.common.sql"
          - pip check

  - package:
      name: ${{ name }}-with-pandas
    build:
      noarch: python
    requirements:
      host:
        - python ${{ python_min }}.*
      run:
        - python >=${{ python_min }}
        - ${{ pin_subpackage(name, exact=True) }}
        - pandas >=2.1.2
        # start pandas[sql-other]
        # end pandas[sql-other]
        # conditional for python >=3.13
        - pandas >=2.2.3
    tests:
      - requirements:
          run:
            - python ${{ python_min }}.*
            - pip
            - apache-airflow ${{ latest_airflow }}.*
        script:
          - python -c "import airflow.providers.common.sql"
          - pip check

  - package:
      name: ${{ name }}-with-polars
    build:
      noarch: python
    requirements:
      host:
        - python ${{ python_min }}.*
      run:
        - python >=${{ python_min }}
        - ${{ pin_subpackage(name, exact=True) }}
        - polars >=1.26.0
    tests:
      - requirements:
          run:
            - python ${{ python_min }}.*
            - pip
            - apache-airflow ${{ latest_airflow }}.*
        script:
          - python -c "import airflow.providers.common.sql"
          - pip check

  # skipping output amazon

  # skipping output apache.iceberg

  # skipping output datafusion

  # skipping output pyiceberg-core

  # skipping output sqlalchemy

about:
  homepage: https://github.com/apache/airflow/
  summary: Provider package apache-airflow-providers-common-sql for Apache Airflow
  license: Apache-2.0
  license_file:
    - LICENSE
    - NOTICE
  documentation: https://airflow.apache.org/docs/apache-airflow-providers-common-sql/stable/index.html
  repository: https://github.com/apache/airflow/

extra:
  recipe-maintainers:
    - xylar
